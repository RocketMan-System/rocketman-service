name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Get version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=dev-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi
      
      - name: Build universal binary
        run: |
          GOOS=darwin GOARCH=amd64 go build -o macos-amd64 -ldflags "-s -w" src/macos/main.go
          GOOS=darwin GOARCH=arm64 go build -o macos-arm64 -ldflags "-s -w" src/macos/main.go
          lipo -create -output rocketman-tunnel-service macos-amd64 macos-arm64
          chmod +x rocketman-tunnel-service
          lipo -info rocketman-tunnel-service
      
      - name: Create archive
        run: |
          mkdir -p release
          cp rocketman-tunnel-service release/
          cp src/macos/install.sh release/
          cp src/macos/uninstall.sh release/
          chmod +x release/*.sh
          cd release && tar -czf ../rocketman-service-macos.tar.gz * && cd ..
          shasum -a 256 rocketman-service-macos.tar.gz > checksums-macos.txt
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            rocketman-tunnel-service
            rocketman-service-macos.tar.gz
            src/macos/install.sh
            src/macos/uninstall.sh
            checksums-macos.txt

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build amd64 and arm64 binaries
        run: |
          GOOS=linux GOARCH=amd64 go build -o linux-amd64 -ldflags "-s -w" src/linux/main.go
          GOOS=linux GOARCH=arm64 go build -o linux-arm64 -ldflags "-s -w" src/linux/main.go

      - name: Create archives
        run: |
          mkdir -p release-linux-amd64 release-linux-arm64

          cp linux-amd64 release-linux-amd64/rocketman-tunnel-service
          cp src/linux/install.sh release-linux-amd64/
          cp src/linux/uninstall.sh release-linux-amd64/
          chmod +x release-linux-amd64/rocketman-tunnel-service release-linux-amd64/*.sh
          tar -czf rocketman-service-linux-amd64.tar.gz -C release-linux-amd64 .

          cp linux-arm64 release-linux-arm64/rocketman-tunnel-service
          cp src/linux/install.sh release-linux-arm64/
          cp src/linux/uninstall.sh release-linux-arm64/
          chmod +x release-linux-arm64/rocketman-tunnel-service release-linux-arm64/*.sh
          tar -czf rocketman-service-linux-arm64.tar.gz -C release-linux-arm64 .

          sha256sum rocketman-service-linux-amd64.tar.gz rocketman-service-linux-arm64.tar.gz > checksums-linux.txt

          cp src/linux/install.sh install-linux.sh
          cp src/linux/uninstall.sh uninstall-linux.sh
          chmod +x install-linux.sh uninstall-linux.sh

      - uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            linux-amd64
            linux-arm64
            rocketman-service-linux-amd64.tar.gz
            rocketman-service-linux-arm64.tar.gz
            install-linux.sh
            uninstall-linux.sh
            checksums-linux.txt

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build Windows executable
        shell: pwsh
        run: |
          go mod download
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          go build -o win_service.exe -ldflags "-s -w" src/windows/main.go

      - uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: win_service.exe

  release:
    name: Create Release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - name: Read version
        id: version
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=v$version" >> $GITHUB_OUTPUT
      
      - name: Check if release exists
        id: check
        run: |
          if gh release view ${{ steps.version.outputs.tag }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}
      
      - uses: actions/download-artifact@v4
        if: steps.check.outputs.exists == 'false'
        with:
          name: macos-artifacts
          path: artifacts/macos
      
      - uses: actions/download-artifact@v4
        if: steps.check.outputs.exists == 'false'
        with:
          name: linux-artifacts
          path: artifacts/linux

      - uses: actions/download-artifact@v4
        if: steps.check.outputs.exists == 'false'
        with:
          name: windows-artifacts
          path: artifacts/windows
      
      - name: Create Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --notes "## RocketMan Tunnel Service

          ### Installation

          **macOS:**
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/install.sh | sudo bash
          \`\`\`

          **Linux (amd64/arm64):**
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/install-linux.sh | sudo bash
          \`\`\`

          **Windows:**
          Download \`win_service.exe\` and install as a service.

          ### Files

          - \`rocketman-tunnel-service\` - macOS universal binary (Intel + Apple Silicon)
          - \`rocketman-service-macos.tar.gz\` - macOS complete package
          - \`rocketman-service-linux-amd64.tar.gz\` - Linux amd64 package
          - \`rocketman-service-linux-arm64.tar.gz\` - Linux arm64 package
          - `install.sh` / `uninstall.sh` - macOS installation scripts
          - `install-linux.sh` / `uninstall-linux.sh` - Linux installation scripts
          - \`win_service.exe\` - Windows service executable" \
            artifacts/macos/rocketman-tunnel-service \
            artifacts/macos/rocketman-service-macos.tar.gz \
            artifacts/macos/src/macos/install.sh \
            artifacts/macos/src/macos/uninstall.sh \
            artifacts/macos/checksums-macos.txt \
            artifacts/linux/rocketman-service-linux-amd64.tar.gz \
            artifacts/linux/rocketman-service-linux-arm64.tar.gz \
            artifacts/linux/install-linux.sh \
            artifacts/linux/uninstall-linux.sh \
            artifacts/linux/checksums-linux.txt \
            artifacts/windows/win_service.exe
        env:
          GH_TOKEN: ${{ github.token }}