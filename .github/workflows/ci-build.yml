name: Build and Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release (Ubuntu only)
    runs-on: self-linux

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gh

      - name: Get version
        id: version
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "tag=v$version" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check
        run: |
          if gh release view ${{ steps.version.outputs.tag }} &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      # -------------------------
      # LINUX BUILD
      # -------------------------
      - name: Build Linux
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p dist/linux-amd64 dist/linux-arm64

          GOOS=linux GOARCH=amd64 go build -o dist/linux-amd64/rocketman-tunnel-service -ldflags "-s -w" src/linux/main.go
          GOOS=linux GOARCH=arm64 go build -o dist/linux-arm64/rocketman-tunnel-service -ldflags "-s -w" src/linux/main.go

          cp src/linux/install.sh dist/linux-amd64/
          cp src/linux/uninstall.sh dist/linux-amd64/
          cp src/linux/install.sh dist/linux-arm64/
          cp src/linux/uninstall.sh dist/linux-arm64/

          chmod +x dist/linux-amd64/* dist/linux-arm64/*

          tar -czf rocketman-service-linux-amd64.tar.gz -C dist/linux-amd64 .
          tar -czf rocketman-service-linux-arm64.tar.gz -C dist/linux-arm64 .

          sha256sum rocketman-service-linux-amd64.tar.gz rocketman-service-linux-arm64.tar.gz > checksums-linux.txt

      # -------------------------
      # MACOS BUILD (cross-compile)
      # -------------------------
      - name: Build macOS
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p dist/macos-amd64 dist/macos-arm64

          GOOS=darwin GOARCH=amd64 go build -o dist/macos-amd64/rocketman-tunnel-service -ldflags "-s -w" src/macos/main.go
          GOOS=darwin GOARCH=arm64 go build -o dist/macos-arm64/rocketman-tunnel-service -ldflags "-s -w" src/macos/main.go

          cp src/macos/install.sh dist/macos-amd64/
          cp src/macos/uninstall.sh dist/macos-amd64/
          cp src/macos/install.sh dist/macos-arm64/
          cp src/macos/uninstall.sh dist/macos-arm64/

          chmod +x dist/macos-amd64/* dist/macos-arm64/*

          tar -czf rocketman-service-macos-amd64.tar.gz -C dist/macos-amd64 .
          tar -czf rocketman-service-macos-arm64.tar.gz -C dist/macos-arm64 .

          sha256sum rocketman-service-macos-amd64.tar.gz rocketman-service-macos-arm64.tar.gz > checksums-macos.txt

      # -------------------------
      # WINDOWS BUILD (cross-compile)
      # -------------------------
      - name: Build Windows
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir -p dist/windows

          GOOS=windows GOARCH=amd64 go build -o dist/windows/win_service.exe -ldflags "-s -w" src/windows/main.go

      # -------------------------
      # CREATE RELEASE
      # -------------------------
      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --notes "## RocketMan Tunnel Service

          ### Installation

          **macOS:**
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/install.sh | sudo bash
          \`\`\`

          **Linux (amd64/arm64):**
          \`\`\`bash
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/install-linux.sh | sudo bash
          \`\`\`

          **Windows:**
          Download \`win_service.exe\` and install as a service.

          ### Files

          - \`rocketman-tunnel-service\` - macOS universal binary (Intel + Apple Silicon)
          - \`rocketman-service-macos.tar.gz\` - macOS complete package
          - \`rocketman-service-linux-amd64.tar.gz\` - Linux amd64 package
          - \`rocketman-service-linux-arm64.tar.gz\` - Linux arm64 package
          - \`install.sh\` / \`uninstall.sh\` - macOS installation scripts
          - \`install-linux.sh\` / \`uninstall-linux.sh\` - Linux installation scripts
          - \`win_service.exe\` - Windows service executable" \
                      rocketman-service-linux-amd64.tar.gz \
                      rocketman-service-linux-arm64.tar.gz \
                      rocketman-service-macos-amd64.tar.gz \
                      rocketman-service-macos-arm64.tar.gz \
                      dist/windows/win_service.exe \
                      checksums-linux.txt \
                      checksums-macos.txt
        env:
          GH_TOKEN: ${{ github.token }}